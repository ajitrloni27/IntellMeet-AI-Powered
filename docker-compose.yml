version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: intellimeet-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: intellimeet-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./Backend
    container_name: intellimeet-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URL: mongodb://mongodb:27017/intellimeet
      JWT_SECRET: your_jwt_secret_change_me
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: mock
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: intellimeet-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
